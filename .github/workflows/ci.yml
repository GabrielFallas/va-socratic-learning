name: CI

on:
  push:
    branches: [main, "phase*"]
  pull_request:
    branches: [main]

jobs:
  unit:
    name: Typecheck · Unit · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  e2e:
    name: End-to-end (Playwright)
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      # No Ollama in CI: the chat route fails gracefully and the Condition B
      # smoke test tolerates the retry-banner path. Pyodide loads from the CDN.
      - run: npm run test:e2e
        env:
          OLLAMA_BASE_URL: http://127.0.0.1:1 # intentionally unreachable
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: tests/e2e/report
          retention-days: 7
